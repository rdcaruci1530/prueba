<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuaderno de Cuentos</title>
    <style>
        /* --- ESTILOS GENERALES Y FONDO --- */
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        /* --- EFECTO CUADERNO --- */
        .cuaderno {
            background-color: #fff9e6;
            width: 80%;
            max-width: 700px;
            padding: 40px 40px 40px 60px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.15);
            border-radius: 5px;
            position: relative;
            background-image: linear-gradient(#e1e1e1 1px, transparent 1px);
            background-size: 100% 2rem;
            line-height: 2rem;
        }

        .cuaderno::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 45px;
            width: 2px;
            background-color: #ff8080;
        }

        /* --- FORMATO DE TEXTO --- */
        .contenido-md {
            color: #003366; /* Letras color azul marino */
            font-size: 16px;
        }

        /* Títulos en color rojo (Soporta h1, h2, h3, h4, etc.) */
        .contenido-md h1, .contenido-md h2, .contenido-md h3, 
        .contenido-md h4, .contenido-md h5, .contenido-md h6 {
            color: #cc0000;
            margin-top: 0;
            line-height: 2rem;
        }

        /* Negrillas en color verde */
        .contenido-md strong {
            color: #008040;
            font-weight: bold;
        }

        .contenido-md p {
            margin: 0 0 2rem 0;
        }
        
        .cargando {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="cuaderno">
        <div id="texto-github" class="contenido-md">
            <p class="cargando">Cargando cuento desde GitHub...</p>
        </div>
    </div>

    <script>
        const urlGitHub = 'https://raw.githubusercontent.com/rdcaruci1530/prueba/refs/heads/master/estilo.md';

        async function obtenerMarkdown() {
            try {
                const respuesta = await fetch(urlGitHub);
                if (!respuesta.ok) throw new Error('Error al conectar');

                const textoMarkdown = await respuesta.text();
                const htmlConvertido = formatearMarkdown(textoMarkdown);
                
                document.getElementById('texto-github').innerHTML = htmlConvertido;
            } catch (error) {
                console.error(error);
                document.getElementById('texto-github').innerHTML = `<p style="color: red;">Error al cargar el texto.</p>`;
            }
        }

        function formatearMarkdown(texto) {
            let lineas = texto.split('\n');
            let htmlResultado = [];

            lineas.forEach(linea => {
                let lineaLimpia = linea.trim();

                // Si la línea está vacía, la ignoramos
                if (lineaLimpia === '') return;

                // 1. Detectar CUALQUIER cantidad de # al inicio (Títulos)
                // Explicación: ^(#+) cuenta cuántos '#' hay al principio, y (.+)$ toma el resto del texto
                const matchTitulo = lineaLimpia.match(/^(#{1,6})\s+(.+)$/);
                
                if (matchTitulo) {
                    let nivel = matchTitulo[1].length; // Cuenta cuántos '#' tiene (en tu caso, dará 3)
                    let contenidoTitulo = matchTitulo[2];
                    
                    // Procesamos por si acaso hay negrillas dentro del título
                    contenidoTitulo = contenidoTitulo.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    
                    htmlResultado.push(`<h${nivel}>${contenidoTitulo}</h${nivel}>`);
                } 
                // 2. Si no es título, es un párrafo común
                else {
                    // Convertir texto entre asteriscos (**texto**) a <strong>
                    let parrafoFormateado = lineaLimpia.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    htmlResultado.push(`<p>${parrafoFormateado}</p>`);
                }
            });

            return htmlResultado.join('');
        }

        obtenerMarkdown();
    </script>

</body>
</html>
